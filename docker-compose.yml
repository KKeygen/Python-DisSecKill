services:
  # ==================== 基础设施 ====================
  mysql:
    image: bitnami/mariadb:latest
    container_name: disseckill-mysql
    environment:
      MARIADB_REPLICATION_MODE: master
      MARIADB_REPLICATION_USER: repl_user
      MARIADB_REPLICATION_PASSWORD: repl_password
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-disseckill_root_2026}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-disseckill}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/bitnami/mariadb/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-disseckill_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disseckill-net

  mysql-slave:
    image: bitnami/mariadb:latest
    container_name: disseckill-mysql-slave
    environment:
      MARIADB_REPLICATION_MODE: slave
      MARIADB_REPLICATION_USER: repl_user
      MARIADB_REPLICATION_PASSWORD: repl_password
      MARIADB_MASTER_HOST: mysql
      MARIADB_MASTER_PORT_NUMBER: 3306
      MARIADB_MASTER_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-disseckill_root_2026}
    ports:
      - "3307:3306"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - mysql_slave_data:/bitnami/mariadb/data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-disseckill_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disseckill-net

  redis:
    image: redis:7-alpine
    container_name: disseckill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disseckill-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: disseckill-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "16672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - disseckill-net

  # ==================== 用户服务 (x2 实例，轮询负载均衡) ====================
  user-service-1:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: disseckill-user-1
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - disseckill-net

  user-service-2:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: disseckill-user-2
    ports:
      - "8011:8001"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - disseckill-net

  # ==================== 商品服务 (x2 实例，加权轮询) ====================
  goods-service-1:
    build:
      context: ./services/goods_service
      dockerfile: Dockerfile
    container_name: disseckill-goods-1
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - disseckill-net

  goods-service-2:
    build:
      context: ./services/goods_service
      dockerfile: Dockerfile
    container_name: disseckill-goods-2
    ports:
      - "8012:8002"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - disseckill-net

  # ==================== 订单服务 (x2 实例，最少连接) ====================
  order-service-1:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: disseckill-order-1
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - disseckill-net

  order-service-2:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: disseckill-order-2
    ports:
      - "8013:8003"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - disseckill-net

  # 秒杀订单消费者（复用 order_service 镜像）
  seckill-consumer:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: disseckill-seckill-consumer
    command: ["python", "-m", "app.consumer"]
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - disseckill-net

  # ==================== 库存服务 (x2 实例，IP Hash) ====================
  inventory-service-1:
    build:
      context: ./services/inventory_service
      dockerfile: Dockerfile
    container_name: disseckill-inventory-1
    ports:
      - "8004:8004"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - disseckill-net

  inventory-service-2:
    build:
      context: ./services/inventory_service
      dockerfile: Dockerfile
    container_name: disseckill-inventory-2
    ports:
      - "8014:8004"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - disseckill-net

  # ==================== API 网关 (Nginx 负载均衡 + 动静分离) ====================
  gateway:
    image: nginx:1.25-alpine
    container_name: disseckill-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service-1
      - user-service-2
      - goods-service-1
      - goods-service-2
      - order-service-1
      - order-service-2
      - inventory-service-1
      - inventory-service-2
      - frontend
    networks:
      - disseckill-net

  # ==================== 前端 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disseckill-frontend
    networks:
      - disseckill-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: disseckill-es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-f", "http://localhost:9200/_cat/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - disseckill-net

volumes:
  mysql_data:
  mysql_slave_data:
  redis_data:
  rabbitmq_data:
  es_data:

networks:
  disseckill-net:
    driver: bridge
