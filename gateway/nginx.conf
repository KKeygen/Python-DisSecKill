worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式：包含upstream信息，方便验证负载均衡效果
    log_format lb_log '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent '
                      'upstream=$upstream_addr rt=$request_time';
    access_log /var/log/nginx/access.log lb_log;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ==================== 负载均衡 upstream ====================
    # 用户服务：轮询（默认算法）
    upstream user_service {
        server user-service-1:8001;
        server user-service-2:8001;
    }

    # 商品服务：加权轮询
    upstream goods_service {
        server goods-service-1:8002 weight=2;
        server goods-service-2:8002 weight=1;
    }

    # 订单服务：最少连接
    upstream order_service {
        least_conn;
        server order-service-1:8003;
        server order-service-2:8003;
    }

    # 库存服务：IP Hash（保证同一用户打到同一实例，利用本地缓存sold_out_map）
    upstream inventory_service {
        ip_hash;
        server inventory-service-1:8004;
        server inventory-service-2:8004;
    }

    # 前端SPA容器
    upstream frontend {
        server frontend:80;
    }

    # 限流配置已注释（测试模式）
    # limit_req_zone $binary_remote_addr zone=seckill_limit:10m rate=50r/s;
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/s;

    server {
        listen 80;
        server_name localhost;

        # ==================== 动静分离：前端静态资源代理 ====================
        # Vue构建产物中的静态资源（JS/CSS/图片），由前端Nginx容器直接返回
        location /assets/ {
            proxy_pass http://frontend/assets/;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Served-By "frontend-static";
        }

        # ==================== 动态API请求 ====================

        # 用户服务
        location /api/user/ {
            proxy_pass http://user_service/api/user/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Upstream-Addr $upstream_addr;
        }

        # 商品服务
        location /api/goods/ {
            proxy_pass http://goods_service/api/goods/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Upstream-Addr $upstream_addr;
        }

        # 订单服务
        location /api/order/ {
            proxy_pass http://order_service/api/order/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Upstream-Addr $upstream_addr;
        }

        # 库存服务（含秒杀接口）
        location /api/inventory/seckill {
            proxy_pass http://inventory_service/api/inventory/seckill;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Upstream-Addr $upstream_addr;
        }

        location /api/inventory/ {
            proxy_pass http://inventory_service/api/inventory/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Upstream-Addr $upstream_addr;
        }

        # 健康检查
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # ==================== 前端SPA回退 ====================
        # 所有非API/非静态请求回退到前端index.html
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
