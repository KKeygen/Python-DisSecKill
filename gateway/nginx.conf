worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream user_service {
        server user-service:8001;
    }
    upstream goods_service {
        server goods-service:8002;
    }
    upstream order_service {
        server order-service:8003;
    }
    upstream inventory_service {
        server inventory-service:8004;
    }

    # 限流配置：秒杀接口每秒50请求
    limit_req_zone $binary_remote_addr zone=seckill_limit:10m rate=50r/s;
    # 通用接口每秒200请求
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/s;

    server {
        listen 80;
        server_name localhost;

        # 用户服务
        location /api/user/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://user_service/api/user/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 商品服务
        location /api/goods/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://goods_service/api/goods/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 订单服务
        location /api/order/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://order_service/api/order/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 库存服务（含秒杀接口）
        location /api/inventory/seckill {
            limit_req zone=seckill_limit burst=10 nodelay;
            proxy_pass http://inventory_service/api/inventory/seckill;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/inventory/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://inventory_service/api/inventory/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 健康检查
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
