services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.0
    container_name: disseckill-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-disseckill_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-disseckill}
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disseckill-net

  redis:
    image: redis:7-alpine
    container_name: disseckill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disseckill-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: disseckill-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "16672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - disseckill-net

  # ==================== 用户服务 (x2 实例，轮询负载均衡) ====================
  user-service-1:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: disseckill-user-1
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - disseckill-net

  user-service-2:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: disseckill-user-2
    ports:
      - "8011:8001"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - disseckill-net

  # ==================== 商品服务 (x2 实例，加权轮询) ====================
  goods-service-1:
    build:
      context: ./services/goods_service
      dockerfile: Dockerfile
    container_name: disseckill-goods-1
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - disseckill-net

  goods-service-2:
    build:
      context: ./services/goods_service
      dockerfile: Dockerfile
    container_name: disseckill-goods-2
    ports:
      - "8012:8002"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - disseckill-net

  # ==================== 订单服务 (x2 实例，最少连接) ====================
  order-service-1:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: disseckill-order-1
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - disseckill-net

  order-service-2:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: disseckill-order-2
    ports:
      - "8013:8003"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - disseckill-net

  # 秒杀订单消费者（复用 order_service 镜像）
  seckill-consumer:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: disseckill-seckill-consumer
    command: ["python", "-m", "app.consumer"]
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - disseckill-net

  # ==================== 库存服务 (x2 实例，IP Hash) ====================
  inventory-service-1:
    build:
      context: ./services/inventory_service
      dockerfile: Dockerfile
    container_name: disseckill-inventory-1
    ports:
      - "8004:8004"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - disseckill-net

  inventory-service-2:
    build:
      context: ./services/inventory_service
      dockerfile: Dockerfile
    container_name: disseckill-inventory-2
    ports:
      - "8014:8004"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - disseckill-net

  # ==================== API 网关 (Nginx 负载均衡 + 动静分离) ====================
  gateway:
    image: nginx:1.25-alpine
    container_name: disseckill-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service-1
      - user-service-2
      - goods-service-1
      - goods-service-2
      - order-service-1
      - order-service-2
      - inventory-service-1
      - inventory-service-2
      - frontend
    networks:
      - disseckill-net

  # ==================== 前端 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disseckill-frontend
    networks:
      - disseckill-net

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:

networks:
  disseckill-net:
    driver: bridge
