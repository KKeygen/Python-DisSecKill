services:
  # ==================== 基础设施 ====================
  mysql:
    image: docker.snakekiss.com/bitnami/mariadb:latest
    container_name: disseckill-mysql
    environment:
      MARIADB_REPLICATION_MODE: master
      MARIADB_REPLICATION_USER: repl_user
      MARIADB_REPLICATION_PASSWORD: repl_password
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-disseckill_root_2026}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-disseckill}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/bitnami/mariadb/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-disseckill_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disseckill-net

  mysql-slave:
    image: docker.snakekiss.com/bitnami/mariadb:latest
    container_name: disseckill-mysql-slave
    environment:
      MARIADB_REPLICATION_MODE: slave
      MARIADB_REPLICATION_USER: repl_user
      MARIADB_REPLICATION_PASSWORD: repl_password
      MARIADB_MASTER_HOST: mysql
      MARIADB_MASTER_PORT_NUMBER: 3306
      MARIADB_MASTER_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-disseckill_root_2026}
    ports:
      - "3307:3306"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - mysql_slave_data:/bitnami/mariadb/data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-disseckill_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disseckill-net

  redis:
    image: docker.snakekiss.com/library/redis:7-alpine
    container_name: disseckill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disseckill-net

  zookeeper:
    image: docker.snakekiss.com/library/zookeeper:3.9
    container_name: disseckill-zookeeper
    ports:
      - "2181:2181"
    networks:
      - disseckill-net

  kafka:
    image: docker.snakekiss.com/wurstmeister/kafka:2.13-2.8.1
    container_name: disseckill-kafka
    environment:
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - disseckill-net

  nacos:
    image: docker.snakekiss.com/nacos/nacos-server:v2.3.2
    container_name: disseckill-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
    networks:
      - disseckill-net

  # ==================== 用户服务 (x2 实例，轮询负载均衡) ====================
  user-service-1:
    build:
      context: ./services
      dockerfile: user_service/Dockerfile
    container_name: disseckill-user-1
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: user-service
      SERVICE_IP: user-service-1
      SERVICE_PORT: 8001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - disseckill-net

  user-service-2:
    build:
      context: ./services
      dockerfile: user_service/Dockerfile
    container_name: disseckill-user-2
    ports:
      - "8011:8001"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: user-service
      SERVICE_IP: user-service-2
      SERVICE_PORT: 8001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - disseckill-net

  # ==================== 商品服务 (x2 实例，加权轮询) ====================
  goods-service-1:
    build:
      context: ./services
      dockerfile: goods_service/Dockerfile
    container_name: disseckill-goods-1
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: goods-service
      SERVICE_IP: goods-service-1
      SERVICE_PORT: 8002
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - disseckill-net

  goods-service-2:
    build:
      context: ./services
      dockerfile: goods_service/Dockerfile
    container_name: disseckill-goods-2
    ports:
      - "8012:8002"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: goods-service
      SERVICE_IP: goods-service-2
      SERVICE_PORT: 8002
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - disseckill-net

  # ==================== 订单服务 (x2 实例，最少连接) ====================
  order-service-1:
    build:
      context: ./services
      dockerfile: order_service/Dockerfile
    container_name: disseckill-order-1
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: order-service
      SERVICE_IP: order-service-1
      SERVICE_PORT: 8003
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      nacos:
        condition: service_started
    networks:
      - disseckill-net

  order-service-2:
    build:
      context: ./services
      dockerfile: order_service/Dockerfile
    container_name: disseckill-order-2
    ports:
      - "8013:8003"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: order-service
      SERVICE_IP: order-service-2
      SERVICE_PORT: 8003
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      nacos:
        condition: service_started
    networks:
      - disseckill-net

  # 秒杀订单消费者（复用 order_service 镜像）
  seckill-consumer:
    build:
      context: ./services
      dockerfile: order_service/Dockerfile
    container_name: disseckill-seckill-consumer
    command: ["python", "-m", "app.consumer"]
    env_file:
      - .env
    environment:
      # consumer 是后台消费者，不需要 Nacos 注册
      NACOS_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: on-failure
    networks:
      - disseckill-net

  # ==================== 库存服务 (x2 实例，IP Hash) ====================
  inventory-service-1:
    build:
      context: ./services
      dockerfile: inventory_service/Dockerfile
    container_name: disseckill-inventory-1
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: inventory-service
      SERVICE_IP: inventory-service-1
      SERVICE_PORT: 8004
      NACOS_CONFIG_DATA_ID: inventory-config.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      nacos:
        condition: service_started
    networks:
      - disseckill-net

  inventory-service-2:
    build:
      context: ./services
      dockerfile: inventory_service/Dockerfile
    container_name: disseckill-inventory-2
    ports:
      - "8014:8004"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: inventory-service
      SERVICE_IP: inventory-service-2
      SERVICE_PORT: 8004
      NACOS_CONFIG_DATA_ID: inventory-config.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      nacos:
        condition: service_started
    networks:
      - disseckill-net

  # ==================== API 网关（Nacos动态发现 + 流量治理） ====================
  gateway:
    build:
      context: ./services
      dockerfile: gateway_service/Dockerfile
    container_name: disseckill-gateway
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      SERVICE_NAME: gateway-service
      SERVICE_IP: gateway
      SERVICE_PORT: 8080
      NACOS_CONFIG_DATA_ID: gateway-config.json
    depends_on:
      - user-service-1
      - user-service-2
      - goods-service-1
      - goods-service-2
      - order-service-1
      - order-service-2
      - inventory-service-1
      - inventory-service-2
      - frontend
      - nacos
    networks:
      - disseckill-net

  # ==================== 前端 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disseckill-frontend
    networks:
      - disseckill-net

  elasticsearch:
    image: docker.snakekiss.com/elasticsearch/elasticsearch:7.17.10
    container_name: disseckill-es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-f", "http://localhost:9200/_cat/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - disseckill-net

volumes:
  mysql_data:
  mysql_slave_data:
  redis_data:
  kafka_data:
  es_data:

networks:
  disseckill-net:
    driver: bridge
